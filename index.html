<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Motivate Me</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:Georgia,serif}
body{background:#0a0a1a;color:#fff;touch-action:pan-y;user-select:none;-webkit-user-select:none}
.scene{position:fixed;inset:0;z-index:1;transition:opacity .8s ease}
.scene-bg{position:absolute;inset:0}
.scene::before,.scene::after{content:'';position:absolute;pointer-events:none}
.particles{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.card-area{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:40px 24px 140px}
.quote-wrap{text-align:center;max-width:340px;animation:fadeInUp .6s ease}
.quote-text{font-style:italic;font-size:20px;line-height:1.6;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.6),0 0 30px rgba(0,0,0,0.3)}
.quote-text.light-scene{color:#2a1a1a;text-shadow:0 1px 8px rgba(255,255,255,0.5)}
.hint{position:fixed;bottom:160px;left:50%;transform:translateX(-50%);font-size:13px;color:rgba(255,255,255,0.5);z-index:11;transition:opacity 1s;font-style:italic}
.hint.hidden{opacity:0;pointer-events:none}
.actions{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:28px;align-items:center}
.act-btn{width:50px;height:50px;border-radius:50%;border:none;background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);font-size:22px;cursor:pointer;transition:transform .2s,background .2s;display:flex;align-items:center;justify-content:center;color:#fff}
.act-btn:active{transform:scale(0.9)}
.fav-btn.loved{color:#ff4466;font-size:26px;animation:heartPop .4s ease}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;height:56px;background:rgba(10,10,20,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.08)}
.nav-btn{flex:1;border:none;background:none;color:rgba(255,255,255,0.5);font-size:14px;cursor:pointer;font-family:Georgia,serif;transition:color .2s}
.nav-btn.active{color:#fff}
.fav-view{position:fixed;inset:0;z-index:25;background:rgba(10,10,26,0.97);padding:20px;padding-bottom:60px;overflow-y:auto}
.fav-view.hidden{display:none}
.fav-header{text-align:center;margin:16px 0 24px;font-size:22px;font-weight:normal}
.fav-list{display:flex;flex-direction:column;gap:12px}
.fav-card{background:rgba(255,255,255,0.05);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,0.06)}
.fav-card-text{flex:1;font-style:italic;font-size:15px;line-height:1.5;color:rgba(255,255,255,0.85)}
.fav-card-rm{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,60,60,0.15);color:#ff6666;font-size:16px;cursor:pointer}
.heart-burst{position:fixed;z-index:50;pointer-events:none}
.mini-heart{position:absolute;font-size:16px;animation:burstUp .8s ease forwards;opacity:0}
@keyframes burstUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(0.5)}}
@keyframes heartPop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.7}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes mehSlide{to{opacity:0;transform:translateX(-120px) rotate(-8deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes drift{0%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(10px,-20px) rotate(5deg)}50%{transform:translate(-5px,-40px) rotate(-3deg)}75%{transform:translate(8px,-60px) rotate(4deg)}100%{transform:translate(-3px,-80px) rotate(-2deg)}}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(calc(100vh + 40px)) rotate(360deg);opacity:0.3}}
@keyframes fallFast{0%{transform:translateY(-30px)}100%{transform:translateY(calc(100vh + 30px))}}
@keyframes sparkle{0%,100%{opacity:0.3;transform:scale(0.5)}50%{opacity:1;transform:scale(1.2)}}
@keyframes floatUp{0%{transform:translateY(0);opacity:0.9}100%{transform:translateY(calc(-100vh - 40px));opacity:0}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes driftButterfly{0%{transform:translate(0,0) rotate(45deg) scale(1)}33%{transform:translate(15px,-30px) rotate(50deg) scale(1.1)}66%{transform:translate(-10px,-60px) rotate(40deg) scale(0.9)}100%{transform:translate(5px,-90px) rotate(45deg) scale(1)}}

@keyframes glitterShift{0%{background-position:0% 0%;opacity:0.4}50%{background-position:50% 50%;opacity:0.7}100%{background-position:100% 100%;opacity:0.4}}

{"text":"Healing is not linear.","scene":"pinkrain","particles":"rain"},
{"text":"You already have everything you need within you.","scene":"temple","particles":"sparkles"},
{"text":"Every day may not be good, but there's something good in every day.","scene":"lanternlake","particles":"lanterns"},
{"text":"Your value doesn't decrease based on someone's inability to see your worth.","scene":"redmoon","particles":"sparkles"},
{"text":"It always seems impossible until it's done.","scene":"torii","particles":"fireflies"},
{"text":"Perhaps the butterfly is proof that you can go through a great deal of darkness yet become something beautiful.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Strength grows in the moments when you think you can't go on but you keep going anyway.","scene":"moonlit","particles":"petals"},
{"text":"Kites rise highest against the wind, not with it.","scene":"pinkrain","particles":"rain"},
{"text":"You don't have to be perfect to be amazing.","scene":"lotus","particles":"lotus"},
{"text":"Begin anywhere.","scene":"torii","particles":"petals"},
{"text":"The quieter you become, the more you can hear.","scene":"lanternlake","particles":"lanterns"},
{"text":"Rock bottom became the solid foundation on which I rebuilt my life.","scene":"redmoon","particles":"sparkles"},
{"text":"Keep your face always toward the sunshine and shadows will fall behind you.","scene":"temple","particles":"sparkles"},
{"text":"What we achieve inwardly will change outer reality.","scene":"moonlit","particles":"fireflies"},
{"text":"Gratitude turns what we have into enough.","scene":"lotus","particles":"lotus"},
{"text":"You are worthy of the love you keep trying to give everyone else.","scene":"pinkrain","particles":"rain"},
{"text":"Don't be pushed around by the fears in your mind. Be led by the dreams in your heart.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Progress, not perfection.","scene":"torii","particles":"petals"},
{"text":"The world breaks everyone, and afterward, many are strong at the broken places.","scene":"redmoon","particles":"sparkles"},
{"text":"Sometimes the smallest step in the right direction ends up being the biggest step of your life.","scene":"moonlit","particles":"petals"},
{"text":"Embrace uncertainty. Some of the most beautiful chapters in our lives won't have a title until much later.","scene":"lanternlake","particles":"lanterns"},
{"text":"You can't pour from an empty cup. Take care of yourself first.","scene":"lotus","particles":"lotus"},
{"text":"The way I see it, if you want the rainbow, you gotta put up with the rain.","scene":"pinkrain","particles":"rain"},
{"text":"No rain, no flowers.","scene":"pinkrain","particles":"rain"},
{"text":"A goal without a plan is just a wish.","scene":"temple","particles":"sparkles"},
{"text":"Life is about moments. Don't wait for them. Create them.","scene":"lanternlake","particles":"lanterns"},
{"text":"We delight in the beauty of the butterfly, but rarely admit the changes it has gone through.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Stop being afraid of what could go wrong and think of what could go right.","scene":"moonlit","particles":"fireflies"},
{"text":"You are the magic you are looking for.","scene":"temple","particles":"sparkles"},
{"text":"Persistence guarantees that results are inevitable.","scene":"torii","particles":"fireflies"},
{"text":"Turn your wounds into wisdom.","scene":"redmoon","particles":"sparkles"},
{"text":"The struggle you're in today is developing the strength you need for tomorrow.","scene":"moonlit","particles":"petals"},
{"text":"Don't wait for the storm to pass. Learn to dance in the rain.","scene":"pinkrain","particles":"rain"},
{"text":"You were given this life because you are strong enough to live it.","scene":"redmoon","particles":"sparkles"},
{"text":"Inner peace begins the moment you choose not to allow another person or event to control your emotions.","scene":"lanternlake","particles":"lanterns"},
{"text":"The greatest glory in living lies not in never falling, but in rising every time we fall.","scene":"torii","particles":"petals"},
{"text":"Become the person who would attract the results you seek.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Everything you've ever wanted is on the other side of fear.","scene":"redmoon","particles":"sparkles"},
{"text":"Be so good they can't ignore you.","scene":"temple","particles":"sparkles"},
{"text":"The only person you are destined to become is the person you decide to be.","scene":"moonlit","particles":"petals"},
{"text":"Collect moments, not things.","scene":"lanternlake","particles":"lanterns"},
{"text":"What consumes your mind controls your life.","scene":"lotus","particles":"lotus"},
{"text":"Set your life on fire. Seek those who fan your flames.","scene":"redmoon","particles":"sparkles"},
{"text":"You don't have to control your thoughts. You just have to stop letting them control you.","scene":"pinkrain","particles":"rain"},
{"text":"And still, I rise.","scene":"torii","particles":"petals"},
{"text":"She believed she could, so she did.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"I am not what happened to me. I am what I choose to become.","scene":"moonlit","particles":"fireflies"},
{"text":"Do not go where the path may lead. Go instead where there is no path and leave a trail.","scene":"torii","particles":"fireflies"},
{"text":"In three words I can sum up everything I've learned about life: it goes on.","scene":"lanternlake","particles":"lanterns"},
{"text":"The only impossible journey is the one you never begin.","scene":"redmoon","particles":"sparkles"},
{"text":"Happiness is a butterfly which when pursued is always beyond your grasp, but which if you sit down quietly may alight upon you.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Don't count the days. Make the days count.","scene":"temple","particles":"sparkles"},
{"text":"You miss 100% of the shots you don't take.","scene":"moonlit","particles":"petals"},
{"text":"The only way to do great work is to love what you do.","scene":"lotus","particles":"lotus"},
{"text":"Act as if what you do makes a difference. It does.","scene":"torii","particles":"petals"},
{"text":"Life isn't about finding yourself. It's about creating yourself.","scene":"temple","particles":"sparkles"},
{"text":"Success is not final, failure is not fatal: it is the courage to continue that counts.","scene":"redmoon","particles":"sparkles"},
{"text":"The future belongs to those who believe in the beauty of their dreams.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"It does not matter how slowly you go as long as you do not stop.","scene":"lotus","particles":"lotus"},
{"text":"In the depth of winter, I finally learned that within me there lay an invincible summer.","scene":"moonlit","particles":"fireflies"},
{"text":"We are what we repeatedly do. Excellence is not an act, but a habit.","scene":"torii","particles":"fireflies"},
{"text":"The journey of a thousand miles begins with one step.","scene":"lanternlake","particles":"lanterns"},
{"text":"May your choices reflect your hopes, not your fears.","scene":"temple","particles":"sparkles"},
{"text":"Happiness is not by chance, but by choice.","scene":"lotus","particles":"lotus"},
{"text":"The sun himself is weak when he first rises, and gathers strength and courage as the day gets on.","scene":"temple","particles":"sparkles"},
{"text":"You can't go back and change the beginning, but you can start where you are and change the ending.","scene":"pinkrain","particles":"rain"},
{"text":"Never let the fear of striking out keep you from playing the game.","scene":"moonlit","particles":"petals"},
{"text":"What you get by achieving your goals is not as important as what you become by achieving your goals.","scene":"torii","particles":"petals"},
{"text":"Believe in yourself and all that you are. Know that there is something inside you that is greater than any obstacle.","scene":"redmoon","particles":"sparkles"},
{"text":"The mind that opens to a new idea never returns to its original size.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Stay close to anything that makes you glad you are alive.","scene":"lanternlake","particles":"lanterns"},
{"text":"Life is really simple, but we insist on making it complicated.","scene":"lotus","particles":"lotus"},
{"text":"You don't have to be great to start, but you have to start to be great.","scene":"moonlit","particles":"petals"},
{"text":"What you think, you become. What you feel, you attract. What you imagine, you create.","scene":"temple","particles":"sparkles"},
{"text":"To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.","scene":"pinkrain","particles":"rain"},
{"text":"Everything has beauty, but not everyone sees it.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"We can complain because rose bushes have thorns, or rejoice because thorns have roses.","scene":"lotus","particles":"lotus"},
{"text":"A diamond is a chunk of coal that did well under pressure.","scene":"redmoon","particles":"sparkles"},
{"text":"The best revenge is massive success.","scene":"torii","particles":"fireflies"},
{"text":"Spread love everywhere you go. Let no one ever come to you without leaving happier.","scene":"lanternlake","particles":"lanterns"},
{"text":"I have not failed. I've just found 10,000 ways that won't work.","scene":"moonlit","particles":"fireflies"},
{"text":"Life is what happens when you're busy making other plans.","scene":"pinkrain","particles":"rain"},
{"text":"With the new day comes new strength and new thoughts.","scene":"temple","particles":"sparkles"},
{"text":"It is during our darkest moments that we must focus to see the light.","scene":"redmoon","particles":"sparkles"},
{"text":"Keep your eyes on the stars, and your feet on the ground.","scene":"moonlit","particles":"petals"},
{"text":"The pain you feel today is the strength you feel tomorrow.","scene":"torii","particles":"petals"},
{"text":"The only thing standing between you and your goal is the story you keep telling yourself.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Your time is limited. Don't waste it living someone else's life.","scene":"redmoon","particles":"sparkles"},
{"text":"Create the things you wish existed.","scene":"temple","particles":"sparkles"},
{"text":"What we think, we become.","scene":"lotus","particles":"lotus"},
{"text":"Dream big. Start small. Act now.","scene":"moonlit","particles":"petals"},
{"text":"You are never too old to set another goal or to dream a new dream.","scene":"lanternlake","particles":"lanterns"},
{"text":"The earth has music for those who listen.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"You don't need more time. You need more focus.","scene":"torii","particles":"fireflies"},
{"text":"Adventure is worthwhile.","scene":"pinkrain","particles":"rain"},
{"text":"The energy you bring to each moment determines the results you get.","scene":"temple","particles":"sparkles"},
{"text":"The stars are mapping out your destiny tonight.","scene":"constellation","particles":"star"},
{"text":"You are as deep and vast as the ocean itself.","scene":"ocean","particles":"bubbles"},
{"text":"Let your thoughts flow like a river. Do not dam them.","scene":"river","particles":"fireflies"},
{"text":"Even the tallest grass bends in the wind. Flexibility is grace.","scene":"grassland","particles":"leaf"},
{"text":"Let the snow cover what was. Tomorrow is blank and beautiful.","scene":"snowfall","particles":"snow"},
{"text":"The aurora exists to remind you that magic is real.","scene":"aurora","particles":"sparkles"},
{"text":"Like sakura, your beauty is in your impermanence. Treasure now.","scene":"sakura","particles":"petals"},
{"text":"You contain multitudes. Entire worlds orbit inside you.","scene":"planets","particles":"sparkles"},
{"text":"Be the light that others are drawn to.","scene":"fireflies","particles":"fireflies"},
{"text":"Rise, gently, like a bubble toward the surface.","scene":"bubbles","particles":"bubbles"},
{"text":"Even in winter, the magnolia prepares to bloom.","scene":"magnolia","particles":"snow"},
{"text":"A thousand lanterns rise for you tonight. Each one is a wish granted.","scene":"lanternfestival","particles":"lanterns"},
{"text":"The cosmos is not chaos. It is a dance. And you are part of it.","scene":"constellation","particles":"star"},
{"text":"Waves do not compete. They simply arrive. So will your moment.","scene":"ocean","particles":"bubbles"},
{"text":"Wandering is not the same as being lost.","scene":"river","particles":"fireflies"},
{"text":"Your roots are deeper than you know.","scene":"grassland","particles":"leaf"},
{"text":"Silence after snowfall is the universe holding its breath for you.","scene":"snowfall","particles":"snow"},
{"text":"Colors you have never seen are waiting in your future.","scene":"aurora","particles":"sparkles"},
{"text":"Petals fall without regret. Let go like that.","scene":"sakura","particles":"petals"},
{"text":"You are not small. You are a universe pretending to be a person.","scene":"planets","particles":"sparkles"},
{"text":"The desert teaches patience. Every grain of sand was once a mountain.","scene":"desertdusk","particles":"sand"},
{"text":"Even the sun sets to rise again.","scene":"desertdusk","particles":"sand"},
{"text":"Let the warmth of your own spirit guide you through barren lands.","scene":"desertdusk","particles":"sand"},
{"text":"Oases exist for those who keep walking.","scene":"desertdusk","particles":"sand"},
{"text":"The horizon is not the end. It is an invitation.","scene":"desertdusk","particles":"sand"},
{"text":"Rain against the glass is the world whispering: rest now.","scene":"rainywindow","particles":"rain"},
{"text":"Some of the best thinking happens while watching raindrops race.","scene":"rainywindow","particles":"rain"},
{"text":"Let the storm outside remind you of the calm within.","scene":"rainywindow","particles":"rain"},
{"text":"Every raindrop carries a universe of possibility.","scene":"rainywindow","particles":"rain"},
{"text":"Behind every cloud the sun is still shining.","scene":"rainywindow","particles":"rain"},
{"text":"You are stardust contemplating stardust.","scene":"nebula","particles":"sparkles"},
{"text":"The universe conspires in favor of dreamers.","scene":"nebula","particles":"sparkles"},
{"text":"You are not lost. You are exploring.","scene":"nebula","particles":"sparkles"},
{"text":"Infinite space holds infinite possibility. So do you.","scene":"nebula","particles":"sparkles"},
{"text":"Your thoughts are constellations waiting to be mapped.","scene":"nebula","particles":"star"},
{"text":"Bend but never break. That is the way of bamboo.","scene":"bamboo","particles":"leaf"},
{"text":"Grow toward the light, no matter how dense the forest.","scene":"bamboo","particles":"leaf"},
{"text":"Simplicity is the ultimate sophistication.","scene":"bamboo","particles":"leaf"},
{"text":"Still waters run deep. Still people run deeper.","scene":"bamboo","particles":"fireflies"},
{"text":"Nature does not hurry, yet everything is accomplished.","scene":"bamboo","particles":"leaf"},
{"text":"The storm will pass. You will not.","scene":"thunderstorm","particles":"lightning"},
{"text":"Thunder is impressive, but it is lightning that does the work.","scene":"thunderstorm","particles":"lightning"},
{"text":"Sometimes you need the storm to appreciate the calm.","scene":"thunderstorm","particles":"rain"},
{"text":"Pressure creates diamonds. Storms create warriors.","scene":"thunderstorm","particles":"lightning"},
{"text":"You have survived every single one of your worst days.","scene":"thunderstorm","particles":"lightning"},
{"text":"Make a wish. The universe is listening.","scene":"starfall","particles":"comets"},
{"text":"Shooting stars are just the universe applauding your courage.","scene":"starfall","particles":"comets"},
{"text":"Some people feel the rain. Others just get wet.","scene":"starfall","particles":"comets"},
{"text":"Let yourself fall into the night sky. It will catch you.","scene":"starfall","particles":"star"},
{"text":"Every falling star once held its place. Change is not failure.","scene":"starfall","particles":"comets"},
{"text":"In the mist, every step forward is an act of faith.","scene":"mistyforest","particles":"mist"},
{"text":"The forest does not judge the sapling.","scene":"mistyforest","particles":"mist"},
{"text":"Get lost in what sets your soul on fire.","scene":"mistyforest","particles":"fireflies"},
{"text":"The trees are whispering your name. Listen.","scene":"mistyforest","particles":"mist"},
{"text":"Not all who wander are lost. Some are finding themselves.","scene":"mistyforest","particles":"mist"},
{"text":"Golden hours were made for golden souls.","scene":"goldenhour","particles":"sparkles"},
{"text":"The magic you are looking for is in the work you are avoiding.","scene":"goldenhour","particles":"sparkles"},
{"text":"Warm light finds everyone eventually.","scene":"goldenhour","particles":"fireflies"},
{"text":"You are the golden hour of someone's day.","scene":"goldenhour","particles":"sparkles"},
{"text":"Every ending is just a new beginning wearing a sunset.","scene":"goldenhour","particles":"sparkles"},
{"text":"Your scars are proof that you are stronger than what tried to break you.","scene":"redmoon","particles":"sparkles"},
{"text":"The night sky is a reminder that darkness is full of beauty.","scene":"constellation","particles":"star"},
{"text":"You do not need permission to become who you were meant to be.","scene":"temple","particles":"sparkles"},
{"text":"The ocean does not apologize for its depth.","scene":"ocean","particles":"bubbles"},
{"text":"Be like water: soft enough to find a way, strong enough to carve a path.","scene":"river","particles":"fireflies"},
{"text":"Even the smallest wildflower changes the landscape.","scene":"grassland","particles":"leaf"},
{"text":"Snowflakes are proof that small things can stop traffic.","scene":"snowfall","particles":"snow"},
{"text":"Dance with the aurora. Let the sky paint your story.","scene":"aurora","particles":"sparkles"},
{"text":"Every petal that falls makes room for a new blossom.","scene":"sakura","particles":"petals"},
{"text":"You orbit no one. You are your own center of gravity.","scene":"planets","particles":"sparkles"},
{"text":"The firefly does not compete with the sun. It simply shines when it is its turn.","scene":"fireflies","particles":"fireflies"},
{"text":"Rise like a bubble — lightly, gently, unstoppably.","scene":"bubbles","particles":"bubbles"},
{"text":"Elegance is when the inside is as beautiful as the outside.","scene":"magnolia","particles":"petals"},
{"text":"Release your wishes to the sky. Let them float.","scene":"lanternfestival","particles":"lanterns"},
{"text":"You were not born to fit in. You were born to stand out like a desert sunrise.","scene":"desertdusk","particles":"sand"},
{"text":"Clarity comes to those who sit with the rain and listen.","scene":"rainywindow","particles":"rain"},
{"text":"You are made of cosmic dust and ancient dreams.","scene":"nebula","particles":"sparkles"},
{"text":"Be hollow like bamboo so the music of life can flow through you.","scene":"bamboo","particles":"leaf"},
{"text":"After every storm there is a rainbow. After every darkness there is light.","scene":"thunderstorm","particles":"lightning"},
{"text":"Wishes are seeds planted in the night sky.","scene":"starfall","particles":"comets"},
{"text":"The fog lifts for those who keep moving.","scene":"mistyforest","particles":"mist"},
{"text":"Bathe yourself in golden light and let the shadows melt.","scene":"goldenhour","particles":"sparkles"},
{"text":"You are a work of art in progress. No artist rushes a masterpiece.","scene":"moonlit","particles":"petals"},
{"text":"The fire inside you is brighter than the fire around you.","scene":"redmoon","particles":"sparkles"},
{"text":"Glow in the dark. That is what stars do.","scene":"constellation","particles":"star"},
{"text":"Depth is not something to fear. It is where treasure lives.","scene":"ocean","particles":"bubbles"},
{"text":"The river never looks back. Neither should you.","scene":"river","particles":"fireflies"},
{"text":"Plant seeds of kindness. Harvest fields of joy.","scene":"grassland","particles":"leaf"},
{"text":"Softness is not weakness. Snow reshapes mountains.","scene":"snowfall","particles":"snow"},
{"text":"You are the northern lights of someone's long winter.","scene":"aurora","particles":"sparkles"},
{"text":"Blossoms do not bloom to impress. They bloom because that is their nature.","scene":"sakura","particles":"petals"},
{"text":"You have galaxies inside you. Do not let anyone tell you otherwise.","scene":"planets","particles":"sparkles"},
{"text":"Your glow-up is happening even in the dark.","scene":"fireflies","particles":"fireflies"},
{"text":"Lightness is a choice. Choose to float.","scene":"bubbles","particles":"bubbles"},
{"text":"Bloom anyway, even in concrete.","scene":"magnolia","particles":"petals"},
{"text":"Let your hope rise like lanterns into the night.","scene":"lanternfestival","particles":"lanterns"},
{"text":"When you feel lost, look up. The stars have been guiding travelers for millennia.","scene":"constellation","particles":"star"},
{"text":"You are the poem the universe wrote to itself.","scene":"moonlit","particles":"fireflies"},
{"text":"Hold on loosely. Let life surprise you.","scene":"lotus","particles":"lotus"},
{"text":"Every step you take is rewriting your story.","scene":"torii","particles":"petals"},
{"text":"Your comeback is always stronger than your setback.","scene":"redmoon","particles":"sparkles"},
{"text":"The wind does not break the flexible reed.","scene":"bamboo","particles":"leaf"},
{"text":"Let the thunder remind you of your own power.","scene":"thunderstorm","particles":"lightning"},
{"text":"Catch your breath. Then catch your dreams.","scene":"starfall","particles":"comets"},
{"text":"Mystery is not something to solve. It is something to live.","scene":"mistyforest","particles":"mist"},
{"text":"The sun does not dim itself for anyone. Neither should you.","scene":"goldenhour","particles":"sparkles"},
{"text":"Still here. Still growing. Still becoming.","scene":"lotus","particles":"lotus"},
{"text":"Trust the next chapter because you are the author.","scene":"temple","particles":"sparkles"},
{"text":"Be the reason someone believes in good people.","scene":"lanternlake","particles":"lanterns"},
{"text":"You are not behind. You are on your own timeline.","scene":"pinkrain","particles":"rain"},
{"text":"Even mountains were once sea floors. Transformation takes time.","scene":"ocean","particles":"bubbles"},
{"text":"The brave do not live forever, but the cautious do not live at all.","scene":"torii","particles":"fireflies"},
{"text":"Your mind is a garden. Your thoughts are the seeds.","scene":"grassland","particles":"leaf"},
{"text":"Dance in the storm and let the lightning be your spotlight.","scene":"thunderstorm","particles":"lightning"},
{"text":"Do not dim your sparkle for anybody.","scene":"nebula","particles":"sparkles"},
{"text":"Everything blooms in its own time.","scene":"sakura","particles":"petals"},
{"text":"You carry oceans in your chest. No wonder you feel heavy sometimes.","scene":"ocean","particles":"bubbles"},
{"text":"Even the longest night cannot prevent the dawn.","scene":"aurora","particles":"sparkles"},
{"text":"Write your own rules. Then break them beautifully.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Peace is always there. You just have to choose to sit with it.","scene":"bamboo","particles":"fireflies"},
{"text":"The stars shine brightest when the night is coldest.","scene":"snowfall","particles":"snow"},
{"text":"Let each heartbeat remind you: you are alive and that is enough.","scene":"lanternlake","particles":"lanterns"},
{"text":"The road may be long but your spirit is longer.","scene":"desertdusk","particles":"sand"},
{"text":"Courage is not the absence of fear but walking through it anyway.","scene":"mistyforest","particles":"mist"},
{"text":"You are the universe's way of experiencing joy.","scene":"nebula","particles":"star"},
{"text":"Your light is needed in this world. Never dim it for anyone.","bg":"backgrounds/bg-001.png","particles":"sparkles"},
{"text":"The universe rearranges itself to make room for your dreams.","bg":"backgrounds/bg-002.png","particles":"fireflies"},
{"text":"You are not a drop in the ocean — you are the entire ocean in a drop.","bg":"backgrounds/bg-003.png","particles":"bubbles"},
{"text":"Breathe deeply. You are exactly where you need to be.","bg":"backgrounds/bg-004.png","particles":"mist"},
{"text":"The stars aligned the day you were born. Never forget that.","bg":"backgrounds/bg-005.png","particles":"star"},
{"text":"Your story is still being written. Make it a page-turner.","bg":"backgrounds/bg-006.png","particles":"sparkles"},
{"text":"Every sunrise is an invitation to brighten someone's day.","bg":"backgrounds/bg-007.png","particles":"fireflies"},
{"text":"You carry within you the fire of a thousand suns.","bg":"backgrounds/bg-008.png","particles":"sparkles"},
{"text":"Courage looks good on you. Wear it every day.","bg":"backgrounds/bg-009.png","particles":"petals"},
{"text":"The world is better because you are in it.","bg":"backgrounds/bg-010.png","particles":"butterflies"},
{"text":"Let your soul breathe. You have earned this moment of peace.","bg":"backgrounds/bg-011.png","particles":"mist"},
{"text":"Growth happens in silence. Trust the quiet seasons.","bg":"backgrounds/bg-012.png","particles":"leaf"},
{"text":"You are proof that beautiful things take time.","bg":"backgrounds/bg-013.png","particles":"petals"},
{"text":"Rise like the dawn — steady, warm, and unstoppable.","bg":"backgrounds/bg-014.png","particles":"sparkles"},
{"text":"Your potential is a garden waiting to bloom.","bg":"backgrounds/bg-015.png","particles":"petals"},
{"text":"In a world of noise, your calm is your superpower.","bg":"backgrounds/bg-016.png","particles":"snow"},
{"text":"The kindness you give returns to you in waves.","bg":"backgrounds/bg-017.png","particles":"bubbles"},
{"text":"Trust the process. Your breakthrough is closer than you think.","bg":"backgrounds/bg-018.png","particles":"sparkles"},
{"text":"You are a masterpiece in motion.","bg":"backgrounds/bg-019.png","particles":"butterflies"},
{"text":"Let gratitude be the rhythm of your heart.","bg":"backgrounds/bg-020.png","particles":"fireflies"},
{"text":"Every challenge is shaping you into who you are meant to be.","bg":"backgrounds/bg-021.png","particles":"rain"},
{"text":"You are stronger than your strongest excuse.","bg":"backgrounds/bg-022.png","particles":"lightning"},
{"text":"Be the energy you want to attract.","bg":"backgrounds/bg-023.png","particles":"sparkles"},
{"text":"Mountains bow to those who climb with patience.","bg":"backgrounds/bg-024.png","particles":"mist"},
{"text":"Your dreams are valid. Chase them relentlessly.","bg":"backgrounds/bg-025.png","particles":"comets"},
{"text":"Inhale possibility. Exhale doubt.","bg":"backgrounds/bg-026.png","particles":"petals"},
{"text":"The road ahead is paved with your persistence.","bg":"backgrounds/bg-027.png","particles":"fireflies"},
{"text":"You were built for this moment. Own it.","bg":"backgrounds/bg-028.png","particles":"sparkles"},
{"text":"Let your scars tell a story of survival, not defeat.","bg":"backgrounds/bg-029.png","particles":"rain"},
{"text":"Grace finds those who keep going.","bg":"backgrounds/bg-030.png","particles":"snow"},
{"text":"Your heart knows truths your mind has yet to discover.","bg":"backgrounds/bg-031.png","particles":"fireflies"},
{"text":"Every ending carries the seed of a new beginning.","bg":"backgrounds/bg-032.png","particles":"petals"},
{"text":"The best view comes after the hardest climb.","bg":"backgrounds/bg-033.png","particles":"mist"},
{"text":"You radiate a light that cannot be extinguished.","bg":"backgrounds/bg-034.png","particles":"sparkles"},
{"text":"Be patient with yourself. Healing is not a race.","bg":"backgrounds/bg-035.png","particles":"lotus"},
{"text":"Your existence is a revolution of love.","bg":"backgrounds/bg-036.png","particles":"petals"},
{"text":"Dare to be the person you always wished you could be.","bg":"backgrounds/bg-037.png","particles":"butterflies"},
{"text":"The universe speaks in synchronicities. Pay attention.","bg":"backgrounds/bg-038.png","particles":"star"},
{"text":"Rest is not a reward — it is a requirement.","bg":"backgrounds/bg-039.png","particles":"snow"},
{"text":"You are not behind. You are blooming at your own pace.","bg":"backgrounds/bg-040.png","particles":"petals"},
{"text":"Let your faith be bigger than your fear.","bg":"backgrounds/bg-041.png","particles":"lanterns"},
{"text":"Storms pass. You remain.","bg":"backgrounds/bg-042.png","particles":"lightning"},
{"text":"The magic is already inside you. Stop looking elsewhere.","bg":"backgrounds/bg-043.png","particles":"sparkles"},
{"text":"You are allowed to take up space in this world.","bg":"backgrounds/bg-044.png","particles":"bubbles"},
{"text":"Every breath is a second chance. Use it wisely.","bg":"backgrounds/bg-045.png","particles":"mist"},
{"text":"Your softness is not weakness — it is quiet strength.","bg":"backgrounds/bg-046.png","particles":"petals"},
{"text":"Forgive yourself for not knowing what you did not know before you learned it.","bg":"backgrounds/bg-047.png","particles":"rain"},
{"text":"You are the author and the hero of your own story.","bg":"backgrounds/bg-048.png","particles":"sparkles"},
{"text":"Let your life be your message.","bg":"backgrounds/bg-049.png","particles":"lanterns"},

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildDeck(){
  deck=shuffle(cards.filter((_,i)=>!mehed.includes(i)));

}

function showCard(){
  if(currentIdx>=deck.length){buildDeck();}
  if(deck.length===0){qText.textContent='No more cards! Remove some from meh list.';return;}
  const card=deck[currentIdx];
  const sceneBg=scene.querySelector('.scene-bg');
  if(card.bg){
    // Image-based background
    const bgKey='bg:'+card.bg;
    if(currentScene!==bgKey){
      scene.className='scene scene-imgbg';
      let blurEl=scene.querySelector('.scene-blur');
      if(blurEl){blurEl.remove();}
      sceneBg.style.backgroundImage='url('+card.bg+')';
      currentScene=bgKey;
      createParticles(card.particles||'sparkles');
    }
  }else{
    // CSS scene-based background
    const sceneClass='scene-'+card.scene;
    if(currentScene!==sceneClass){
      scene.className='scene '+sceneClass;
      let blurEl=scene.querySelector('.scene-blur');
      if(blurEl){blurEl.remove();}
      sceneBg.style.backgroundImage='';
      sceneBg.style.backgroundSize='';
      sceneBg.style.backgroundPosition='';
      currentScene=sceneClass;
      createParticles(card.particles);
    }
  }
  if(card.bg){
    qText.classList.remove('light-scene');
  }else if(lightScenes.includes(card.scene)){
    qText.classList.add('light-scene');
  }else{
    qText.classList.remove('light-scene');
  }
  quoteWrap.style.animation='none';
  void quoteWrap.offsetHeight;
  quoteWrap.style.animation='fadeInUp .6s ease';
  qText.textContent=card.text;
  // Update fav button state
  const origIdx=cards.indexOf(card);
  if(favs.includes(origIdx)){
    favBtn.innerHTML='&#x2764;';
    favBtn.classList.add('loved');
  }else{
    favBtn.innerHTML='&#x2661;';
    favBtn.classList.remove('loved');
  }
}

function nextCard(){
  if(!hintShown){hint.classList.add('hidden');hintShown=true;}
  currentIdx++;
  if(playingFavs&&currentIdx>=deck.length){currentIdx=0;}
  showCard();
}

function mehCard(){
  if(deck.length===0)return;
  const card=deck[currentIdx];
  const origIdx=cards.indexOf(card);
  if(!mehed.includes(origIdx)){
    mehed.push(origIdx);
    localStorage.setItem('mm2_mehed',JSON.stringify(mehed));
  }
  // Animate out
  quoteWrap.style.animation='mehSlide .4s ease forwards';
  setTimeout(()=>{
    deck.splice(currentIdx,1);
    if(currentIdx>=deck.length)currentIdx=0;
    showCard();
  },400);
}
function favCard(){
  if(deck.length===0)return;
  const card=deck[currentIdx];
  const origIdx=cards.indexOf(card);
  if(favs.includes(origIdx)){
    favs=favs.filter(x=>x!==origIdx);
    favBtn.innerHTML='&#x2661;';
    favBtn.classList.remove('loved');
  }else{
    favs.push(origIdx);
    favBtn.innerHTML='&#x2764;';
    favBtn.classList.add('loved');
    burstHearts();
  }
  localStorage.setItem('mm2_favs',JSON.stringify(favs));
}

function burstHearts(){
  const rect=favBtn.getBoundingClientRect();
  heartBurst.style.left=rect.left+rect.width/2+'px';
  heartBurst.style.top=rect.top+'px';
  heartBurst.innerHTML='';
  for(let i=0;i<5;i++){
    const h=document.createElement('span');
    h.className='mini-heart';
    h.textContent='❤️';
    h.style.left=(Math.random()*40-20)+'px';
    h.style.animationDelay=(i*0.08)+'s';
    heartBurst.appendChild(h);
  }
  setTimeout(()=>{heartBurst.innerHTML='';},900);
}

function showFavorites(){
  favView.classList.remove('hidden');
  cardArea.style.display='none';
  actions.style.display='none';
  navHome.classList.remove('active');
  navFav.classList.add('active');
  renderFavList();

function showHome(){
  favView.classList.add('hidden');
  cardArea.style.display='flex';
  actions.style.display='flex';
  navHome.classList.add('active');
  navFav.classList.remove('active');
  if(playingFavs){
    playingFavs=false;
    buildDeck();
    showCard();
  }
}
function renderFavList(){
  favList.innerHTML='';
  if(favs.length===0){
    favList.innerHTML='<p style="text-align:center;color:rgba(255,255,255,0.4);padding:40px;font-style:italic">No favorites yet. Tap the heart on cards you love.</p>';
    return;
  }
  favs.forEach((idx,fi)=>{
    const card=cards[idx];
    if(!card)return;
    const div=document.createElement('div');
    div.className='fav-card';
    div.innerHTML=`<span class="fav-card-text">${card.text}</span><button class="fav-card-rm" data-fi="${fi}">✕</button>`;
    favList.appendChild(div);
  });
  favList.querySelectorAll('.fav-card-rm').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const fi=parseInt(e.target.dataset.fi);
      favs.splice(fi,1);
      localStorage.setItem('mm2_favs',JSON.stringify(favs));
      renderFavList();
      // Update current card fav state
      if(deck.length>0){
        const card=deck[currentIdx];
        const origIdx=cards.indexOf(card);
        if(!favs.includes(origIdx)){
          favBtn.innerHTML='&#x2661;';
          favBtn.classList.remove('loved');
        }
      }
    });
  });
}

// Play Favorites
function playFavorites(){
  if(favs.length===0)return;
  favView.classList.add('hidden');
  cardArea.style.display='flex';
  actions.style.display='flex';
  navHome.classList.add('active');
  navFav.classList.remove('active');
  playingFavs=true;
  deck=favs.map(idx=>cards[idx]).filter(Boolean);
  currentIdx=0;
  showCard();
}
document.getElementById('playFavBtn').addEventListener('click',playFavorites);

// Ambient sound system
let audioCtx=null;
let ambientPlaying=false;
let ambientTimeout=null;

const ambientSounds={
  rain:function(ctx,dur){
    const bufSize=ctx.sampleRate*dur;
    const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++){data[i]=(Math.random()*2-1)*0.15;}
    const src=ctx.createBufferSource();src.buffer=buf;
    const filt=ctx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=800;
    const gain=ctx.createGain();gain.gain.setValueAtTime(0,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.3,ctx.currentTime+1);
    gain.gain.setValueAtTime(0.3,ctx.currentTime+dur-2);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
    src.connect(filt);filt.connect(gain);gain.connect(ctx.destination);
    src.start();src.stop(ctx.currentTime+dur);return src;
  },
  birds:function(ctx,dur){
    const nodes=[];
    function chirp(time){
      const osc=ctx.createOscillator();const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';
      const baseF=1800+Math.random()*1200;
      osc.frequency.setValueAtTime(baseF,time);
      osc.frequency.exponentialRampToValueAtTime(baseF*1.3,time+0.05);
      osc.frequency.exponentialRampToValueAtTime(baseF*0.8,time+0.1);
      osc.frequency.exponentialRampToValueAtTime(baseF*1.1,time+0.15);
      gain.gain.setValueAtTime(0,time);
      gain.gain.linearRampToValueAtTime(0.06,time+0.02);
      gain.gain.linearRampToValueAtTime(0,time+0.2);
      osc.start(time);osc.stop(time+0.2);nodes.push(osc);
    }
    for(let t=0;t<dur-1;t+=0.4+Math.random()*0.8){chirp(ctx.currentTime+t);}
    return nodes[0];
  },
  water:function(ctx,dur){
    const bufSize=ctx.sampleRate*dur;
    const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++){data[i]=(Math.random()*2-1)*0.2;}
    const src=ctx.createBufferSource();src.buffer=buf;
    const filt=ctx.createBiquadFilter();filt.type='bandpass';filt.frequency.value=400;filt.Q.value=2;
    const lfo=ctx.createOscillator();const lfoGain=ctx.createGain();
    lfo.frequency.value=0.3;lfoGain.gain.value=200;
    lfo.connect(lfoGain);lfoGain.connect(filt.frequency);lfo.start();
    const gain=ctx.createGain();gain.gain.setValueAtTime(0,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.25,ctx.currentTime+1);
    gain.gain.setValueAtTime(0.25,ctx.currentTime+dur-2);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
    src.connect(filt);filt.connect(gain);gain.connect(ctx.destination);
    src.start();src.stop(ctx.currentTime+dur);lfo.stop(ctx.currentTime+dur);return src;
  },
  wind:function(ctx,dur){
    const bufSize=ctx.sampleRate*dur;
    const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++){data[i]=(Math.random()*2-1)*0.3;}
    const src=ctx.createBufferSource();src.buffer=buf;
    const filt=ctx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=300;
    const lfo=ctx.createOscillator();const lfoGain=ctx.createGain();
    lfo.frequency.value=0.15;lfoGain.gain.value=150;
    lfo.connect(lfoGain);lfoGain.connect(filt.frequency);lfo.start();
    const gain=ctx.createGain();gain.gain.setValueAtTime(0,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.2,ctx.currentTime+1.5);
    gain.gain.setValueAtTime(0.2,ctx.currentTime+dur-2);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
    src.connect(filt);filt.connect(gain);gain.connect(ctx.destination);
    src.start();src.stop(ctx.currentTime+dur);lfo.stop(ctx.currentTime+dur);return src;
  },
  crickets:function(ctx,dur){
    const nodes=[];
    function chirr(time){
      const osc=ctx.createOscillator();const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='square';osc.frequency.value=4000+Math.random()*1000;
      gain.gain.setValueAtTime(0,time);
      gain.gain.linearRampToValueAtTime(0.03,time+0.01);
      gain.gain.setValueAtTime(0.03,time+0.05);
      gain.gain.linearRampToValueAtTime(0,time+0.08);
      osc.start(time);osc.stop(time+0.08);nodes.push(osc);
    }
    for(let t=0;t<dur-1;t+=0.1+Math.random()*0.2){chirr(ctx.currentTime+t);}
    return nodes[0];
  }
};

const ambientTypes=['rain','birds','water','wind','crickets'];

function playAmbient(){
  if(ambientPlaying)return;
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    ambientPlaying=true;
    sndBtn.style.opacity='1';
    sndBtn.style.animation='pulse 1s ease-in-out infinite';
    const type=ambientTypes[Math.floor(Math.random()*ambientTypes.length)];
    ambientSounds[type](audioCtx,10);
    ambientTimeout=setTimeout(()=>{
      ambientPlaying=false;
      sndBtn.style.animation='';
    },10000);
  }catch(e){ambientPlaying=false;}
}

function playChime(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.type='sine';osc.frequency.setValueAtTime(800+Math.random()*400,audioCtx.currentTime);
    gain.gain.setValueAtTime(0.06,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
    osc.start();osc.stop(audioCtx.currentTime+0.5);
  }catch(e){}
}

sndBtn.addEventListener('click',e=>{e.stopPropagation();playAmbient();});

// Event listeners
mehBtn.addEventListener('click',e=>{e.stopPropagation();mehCard();});
favBtn.addEventListener('click',e=>{e.stopPropagation();favCard();playChime();});
navHome.addEventListener('click',showHome);
navFav.addEventListener('click',showFavorites);

// Tap to advance
cardArea.addEventListener('click',e=>{
  if(e.target.closest('.act-btn')||e.target.closest('.bottom-nav'))return;
  nextCard();
  playChime();
});

// Swipe to advance
cardArea.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
cardArea.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){
    nextCard();playChime();
  }
},{passive:true});

// Init
buildDeck();
showCard();

// Register SW
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
})();
</script>
