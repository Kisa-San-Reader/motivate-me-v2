.scene-bluebutterfly .scene-bg{background:linear-gradient(180deg,#050a15,#0a1a30 50%,#081828)}

<body>

<script type="application/json" id="card-data">
[
{"text":"You are allowed to be both a masterpiece and a work in progress.","scene":"moonlit","particles":"petals"},
{"text":"The moon does not fight. It attacks no one. And yet, it lights the night.","scene":"moonlit","particles":"fireflies"},
{"text":"Stars can't shine without darkness.","scene":"redmoon","particles":"sparkles"},
{"text":"You are the universe experiencing itself.","scene":"redmoon","particles":"sparkles"},
{"text":"Let your soul glow in its own quiet light.","scene":"lanternlake","particles":"lanterns"},
{"text":"Be a lamp, or a lifeboat, or a ladder. Help someone's soul heal.","scene":"lanternlake","particles":"lanterns"},
{"text":"Bloom where you are planted.","scene":"lotus","particles":"lotus"},
{"text":"From the mud grows the lotus.","scene":"lotus","particles":"petals"},
{"text":"You carry the sun in your heart.","scene":"temple","particles":"sparkles"},
{"text":"The wound is the place where the Light enters you.","scene":"temple","particles":"sparkles"},
{"text":"Let your tears water the seeds of your future happiness.","scene":"pinkrain","particles":"rain"},
{"text":"After the rain, the sun will reappear.","scene":"pinkrain","particles":"rain"},
{"text":"Walk through the gate of your fears.","scene":"torii","particles":"petals"},
{"text":"Every path begins with a single step.","scene":"torii","particles":"fireflies"},
{"text":"Transformation is not a future event. It is a present-day activity.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"What the caterpillar calls the end, the rest of the world calls a butterfly.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Not all storms come to disrupt your life. Some come to clear your path.","scene":"redmoon","particles":"sparkles"},
{"text":"You don't have to see the whole staircase, just take the first step.","scene":"moonlit","particles":"fireflies"},
{"text":"Be gentle with yourself. You're doing the best you can.","scene":"lotus","particles":"lotus"},
{"text":"Your calm mind is the ultimate weapon against your challenges.","scene":"lanternlake","particles":"lanterns"},
{"text":"The only way out is through.","scene":"torii","particles":"petals"},
{"text":"In the middle of difficulty lies opportunity.","scene":"redmoon","particles":"sparkles"},
{"text":"You are braver than you believe, stronger than you seem, and smarter than you think.","scene":"moonlit","particles":"petals"},
{"text":"Inhale courage. Exhale fear.","scene":"pinkrain","particles":"rain"},
{"text":"This too shall pass.","scene":"lanternlake","particles":"lanterns"},
{"text":"You are not a drop in the ocean. You are the entire ocean in a drop.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"The lotus blooms most beautifully from the deepest mud.","scene":"lotus","particles":"lotus"},
{"text":"Trust the timing of your life.","scene":"temple","particles":"sparkles"},
{"text":"Your heart knows the way. Run in that direction.","scene":"torii","particles":"fireflies"},
{"text":"She remembered who she was and the game changed.","scene":"redmoon","particles":"sparkles"},
{"text":"When you can't find the sunshine, be the sunshine.","scene":"temple","particles":"sparkles"},
{"text":"The mountain is you. Keep climbing.","scene":"moonlit","particles":"petals"},
{"text":"Peace comes from within. Do not seek it without.","scene":"lotus","particles":"lotus"},
{"text":"Let go of what no longer serves you.","scene":"pinkrain","particles":"rain"},
{"text":"You are enough. You have always been enough.","scene":"lanternlake","particles":"lanterns"},
{"text":"The best time to plant a tree was 20 years ago. The second best time is now.","scene":"torii","particles":"fireflies"},
{"text":"Courage does not always roar. Sometimes it is the quiet voice at the end of the day saying, I will try again tomorrow.","scene":"moonlit","particles":"fireflies"},
{"text":"What lies behind us and what lies before us are tiny matters compared to what lies within us.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"You are the sky. Everything else is just the weather.","scene":"redmoon","particles":"sparkles"},
{"text":"The bamboo that bends is stronger than the oak that resists.","scene":"lotus","particles":"lotus"},
{"text":"Do not judge yourself by your past. You don't live there anymore.","scene":"temple","particles":"sparkles"},
{"text":"The river does not drink its own water. Live for others.","scene":"lanternlake","particles":"lanterns"},
{"text":"Every sunset is an opportunity to reset.","scene":"torii","particles":"petals"},
{"text":"You were born with wings. Why prefer to crawl through life?","scene":"bluebutterfly","particles":"butterflies"},
{"text":"A smooth sea never made a skilled sailor.","scene":"redmoon","particles":"sparkles"},
{"text":"The secret of getting ahead is getting started.","scene":"moonlit","particles":"petals"},
{"text":"Difficult roads often lead to beautiful destinations.","scene":"pinkrain","particles":"rain"},
{"text":"Your potential is endless. Go do what you were created to do.","scene":"temple","particles":"sparkles"},
{"text":"Believe you can and you're halfway there.","scene":"moonlit","particles":"fireflies"},
{"text":"Fall seven times, stand up eight.","scene":"torii","particles":"petals"},
{"text":"The darkest nights produce the brightest stars.","scene":"redmoon","particles":"sparkles"},
{"text":"You are made of stardust and resilience.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Happiness is not something readymade. It comes from your own actions.","scene":"lotus","particles":"lotus"},
{"text":"In a gentle way, you can shake the world.","scene":"pinkrain","particles":"rain"},
{"text":"Your energy introduces you before you even speak.","scene":"lanternlake","particles":"lanterns"},
{"text":"The universe is not outside of you. Look inside yourself.","scene":"redmoon","particles":"sparkles"},
{"text":"Every morning is a fresh beginning.","scene":"temple","particles":"sparkles"},
{"text":"Growth is uncomfortable because you've never been here before.","scene":"moonlit","particles":"petals"},
{"text":"What you seek is seeking you.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Be water, my friend.","scene":"lanternlake","particles":"lanterns"},
{"text":"The wound heals, but it never does in a straight line.","scene":"pinkrain","particles":"rain"},
{"text":"Surrender to what is. Let go of what was. Have faith in what will be.","scene":"lotus","particles":"lotus"},
{"text":"Where there is love, there is life.","scene":"temple","particles":"sparkles"},
{"text":"When the roots are deep, there is no reason to fear the wind.","scene":"torii","particles":"fireflies"},
{"text":"You are not stuck. You are just preparing your next jump.","scene":"moonlit","particles":"petals"},
{"text":"The soul always knows what to do to heal itself. The challenge is to silence the mind.","scene":"lanternlake","particles":"lanterns"},
{"text":"Nothing in nature blooms all year. Be patient with yourself.","scene":"lotus","particles":"lotus"},
{"text":"If you want to fly, you have to give up what weighs you down.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"You are a ghost driving a meat-coated skeleton made from stardust. What do you have to be afraid of?","scene":"redmoon","particles":"sparkles"},
{"text":"The present moment is filled with joy and happiness. If you are attentive, you will see it.","scene":"temple","particles":"sparkles"},
{"text":"One small positive thought in the morning can change your whole day.","scene":"moonlit","particles":"fireflies"},
{"text":"Rivers know this: there is no hurry. We shall get there some day.","scene":"lanternlake","particles":"lanterns"},
{"text":"You don't always need a plan. Sometimes you just need to breathe, trust, let go, and see what happens.","scene":"pinkrain","particles":"rain"},
{"text":"Your life is your story. Write well. Edit often.","scene":"torii","particles":"petals"},
{"text":"Close your eyes, clear your heart, let it go.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Do what makes your soul shine.","scene":"temple","particles":"sparkles"},
{"text":"Almost everything will work again if you unplug it for a few minutes. Including you.","scene":"moonlit","particles":"petals"},
{"text":"You carry grace in your bones.","scene":"lotus","particles":"lotus"},
{"text":"The only limit to our realization of tomorrow is our doubts of today.","scene":"redmoon","particles":"sparkles"},
{"text":"There is a crack in everything. That's how the light gets in.","scene":"lanternlake","particles":"lanterns"},
{"text":"The flower doesn't dream of the bee. It blossoms and the bee comes.","scene":"lotus","particles":"lotus"},
{"text":"Silence is the sleep that nourishes wisdom.","scene":"moonlit","particles":"fireflies"},
{"text":"To understand everything is to forgive everything.","scene":"temple","particles":"sparkles"},
{"text":"Life shrinks or expands in proportion to one's courage.","scene":"redmoon","particles":"sparkles"},
{"text":"Out of your vulnerabilities will come your strength.","scene":"pinkrain","particles":"rain"},
{"text":"The only zen you find on the tops of mountains is the zen you bring up there.","scene":"torii","particles":"petals"},
{"text":"Don't let yesterday take up too much of today.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Your peace is more important than driving yourself crazy trying to understand why something happened.","scene":"lanternlake","particles":"lanterns"},
{"text":"She was powerful not because she wasn't scared but because she went on so strongly despite the fear.","scene":"redmoon","particles":"sparkles"},
{"text":"When we are no longer able to change a situation, we are challenged to change ourselves.","scene":"moonlit","particles":"petals"},
{"text":"Doubt kills more dreams than failure ever will.","scene":"torii","particles":"fireflies"},
{"text":"The mind is everything. What you think you become.","scene":"temple","particles":"sparkles"},
{"text":"Be like a tree. Stay grounded. Connect with your roots. Turn over a new leaf. Bend before you break.","scene":"lotus","particles":"lotus"},
{"text":"Breathe, darling. This is just a chapter. Not the whole story.","scene":"pinkrain","particles":"rain"},
{"text":"The strongest people are not those who show strength in front of us but those who win battles we know nothing about.","scene":"redmoon","particles":"sparkles"},
{"text":"Today is a good day to try.","scene":"moonlit","particles":"petals"},
{"text":"Not everything that is faced can be changed, but nothing can be changed until it is faced.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Comparison is the thief of joy.","scene":"lanternlake","particles":"lanterns"},
{"text":"You are the author of your own life story.","scene":"temple","particles":"sparkles"},
{"text":"When nothing goes right, go left.","scene":"torii","particles":"petals"},
{"text":"Worry is a misuse of imagination.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"You are confined only by the walls you build yourself.","scene":"redmoon","particles":"sparkles"},
{"text":"A bird sitting on a tree is never afraid of the branch breaking, because its trust is not in the branch but in its own wings.","scene":"moonlit","particles":"petals"},
{"text":"The best project you'll ever work on is you.","scene":"lotus","particles":"lotus"},
{"text":"Healing is not linear.","scene":"pinkrain","particles":"rain"},
{"text":"You already have everything you need within you.","scene":"temple","particles":"sparkles"},
{"text":"Every day may not be good, but there's something good in every day.","scene":"lanternlake","particles":"lanterns"},
{"text":"Your value doesn't decrease based on someone's inability to see your worth.","scene":"redmoon","particles":"sparkles"},

{"text":"The quieter you become, the more you can hear.","scene":"lanternlake","particles":"lanterns"},

{"text":"What we achieve inwardly will change outer reality.","scene":"moonlit","particles":"fireflies"},
{"text":"Gratitude turns what we have into enough.","scene":"lotus","particles":"lotus"},

{"text":"The way I see it, if you want the rainbow, you gotta put up with the rain.","scene":"pinkrain","particles":"rain"},

{"text":"We delight in the beauty of the butterfly, but rarely admit the changes it has gone through.","scene":"bluebutterfly","particles":"butterflies"},

{"text":"Persistence guarantees that results are inevitable.","scene":"torii","particles":"fireflies"},
{"text":"Turn your wounds into wisdom.","scene":"redmoon","particles":"sparkles"},
{"text":"The struggle you're in today is developing the strength you need for tomorrow.","scene":"moonlit","particles":"petals"},
{"text":"Don't wait for the storm to pass. Learn to dance in the rain.","scene":"pinkrain","particles":"rain"},
{"text":"You were given this life because you are strong enough to live it.","scene":"redmoon","particles":"sparkles"},
{"text":"Inner peace begins the moment you choose not to allow another person or event to control your emotions.","scene":"lanternlake","particles":"lanterns"},
{"text":"The greatest glory in living lies not in never falling, but in rising every time we fall.","scene":"torii","particles":"petals"},

{"text":"Be so good they can't ignore you.","scene":"temple","particles":"sparkles"},
{"text":"The only person you are destined to become is the person you decide to be.","scene":"moonlit","particles":"petals"},
{"text":"Collect moments, not things.","scene":"lanternlake","particles":"lanterns"},
{"text":"What consumes your mind controls your life.","scene":"lotus","particles":"lotus"},
{"text":"Set your life on fire. Seek those who fan your flames.","scene":"redmoon","particles":"sparkles"},
{"text":"You don't have to control your thoughts. You just have to stop letting them control you.","scene":"pinkrain","particles":"rain"},
{"text":"And still, I rise.","scene":"torii","particles":"petals"},
{"text":"She believed she could, so she did.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"I am not what happened to me. I am what I choose to become.","scene":"moonlit","particles":"fireflies"},
{"text":"Do not go where the path may lead. Go instead where there is no path and leave a trail.","scene":"torii","particles":"fireflies"},
{"text":"In three words I can sum up everything I've learned about life: it goes on.","scene":"lanternlake","particles":"lanterns"},
{"text":"The only impossible journey is the one you never begin.","scene":"redmoon","particles":"sparkles"},
{"text":"Happiness is a butterfly which when pursued is always beyond your grasp, but which if you sit down quietly may alight upon you.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Don't count the days. Make the days count.","scene":"temple","particles":"sparkles"},
{"text":"You miss 100% of the shots you don't take.","scene":"moonlit","particles":"petals"},
{"text":"The only way to do great work is to love what you do.","scene":"lotus","particles":"lotus"},
{"text":"Act as if what you do makes a difference. It does.","scene":"torii","particles":"petals"},
{"text":"Life isn't about finding yourself. It's about creating yourself.","scene":"temple","particles":"sparkles"},
{"text":"Success is not final, failure is not fatal: it is the courage to continue that counts.","scene":"redmoon","particles":"sparkles"},
{"text":"The future belongs to those who believe in the beauty of their dreams.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"It does not matter how slowly you go as long as you do not stop.","scene":"lotus","particles":"lotus"},
{"text":"In the depth of winter, I finally learned that within me there lay an invincible summer.","scene":"moonlit","particles":"fireflies"},
{"text":"We are what we repeatedly do. Excellence is not an act, but a habit.","scene":"torii","particles":"fireflies"},
{"text":"The journey of a thousand miles begins with one step.","scene":"lanternlake","particles":"lanterns"},
{"text":"May your choices reflect your hopes, not your fears.","scene":"temple","particles":"sparkles"},
{"text":"Happiness is not by chance, but by choice.","scene":"lotus","particles":"lotus"},
{"text":"The sun himself is weak when he first rises, and gathers strength and courage as the day gets on.","scene":"temple","particles":"sparkles"},
{"text":"You can't go back and change the beginning, but you can start where you are and change the ending.","scene":"pinkrain","particles":"rain"},
{"text":"Never let the fear of striking out keep you from playing the game.","scene":"moonlit","particles":"petals"},
{"text":"What you get by achieving your goals is not as important as what you become by achieving your goals.","scene":"torii","particles":"petals"},
{"text":"Believe in yourself and all that you are. Know that there is something inside you that is greater than any obstacle.","scene":"redmoon","particles":"sparkles"},
{"text":"The mind that opens to a new idea never returns to its original size.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Stay close to anything that makes you glad you are alive.","scene":"lanternlake","particles":"lanterns"},
{"text":"Life is really simple, but we insist on making it complicated.","scene":"lotus","particles":"lotus"},
{"text":"You don't have to be great to start, but you have to start to be great.","scene":"moonlit","particles":"petals"},
{"text":"What you think, you become. What you feel, you attract. What you imagine, you create.","scene":"temple","particles":"sparkles"},
{"text":"To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.","scene":"pinkrain","particles":"rain"},
{"text":"Everything has beauty, but not everyone sees it.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"We can complain because rose bushes have thorns, or rejoice because thorns have roses.","scene":"lotus","particles":"lotus"},
{"text":"A diamond is a chunk of coal that did well under pressure.","scene":"redmoon","particles":"sparkles"},
{"text":"The best revenge is massive success.","scene":"torii","particles":"fireflies"},
{"text":"Spread love everywhere you go. Let no one ever come to you without leaving happier.","scene":"lanternlake","particles":"lanterns"},
{"text":"I have not failed. I've just found 10,000 ways that won't work.","scene":"moonlit","particles":"fireflies"},
{"text":"Life is what happens when you're busy making other plans.","scene":"pinkrain","particles":"rain"},
{"text":"With the new day comes new strength and new thoughts.","scene":"temple","particles":"sparkles"},
{"text":"It is during our darkest moments that we must focus to see the light.","scene":"redmoon","particles":"sparkles"},
{"text":"Keep your eyes on the stars, and your feet on the ground.","scene":"moonlit","particles":"petals"},
{"text":"The pain you feel today is the strength you feel tomorrow.","scene":"torii","particles":"petals"},
{"text":"The only thing standing between you and your goal is the story you keep telling yourself.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"Your time is limited. Don't waste it living someone else's life.","scene":"redmoon","particles":"sparkles"},
{"text":"Create the things you wish existed.","scene":"temple","particles":"sparkles"},
{"text":"What we think, we become.","scene":"lotus","particles":"lotus"},
{"text":"Dream big. Start small. Act now.","scene":"moonlit","particles":"petals"},
{"text":"You are never too old to set another goal or to dream a new dream.","scene":"lanternlake","particles":"lanterns"},
{"text":"The earth has music for those who listen.","scene":"bluebutterfly","particles":"butterflies"},
{"text":"You don't need more time. You need more focus.","scene":"torii","particles":"fireflies"},
{"text":"Adventure is worthwhile.","scene":"pinkrain","particles":"rain"},
{"text":"The energy you bring to each moment determines the results you get.","scene":"temple","particles":"sparkles"}
]
</script>
<script>
(function(){
'use strict';
const cards=JSON.parse(document.getElementById('card-data').textContent);
const scene=document.getElementById('scene');
const particles=document.getElementById('particles');
const qText=document.getElementById('qText');
const quoteWrap=document.getElementById('quoteWrap');
const hint=document.getElementById('hint');
const mehBtn=document.getElementById('mehBtn');
const favBtn=document.getElementById('favBtn');
const sndBtn=document.getElementById('sndBtn');
const navHome=document.getElementById('navHome');
const navFav=document.getElementById('navFav');
const favView=document.getElementById('favView');
const favList=document.getElementById('favList');
const cardArea=document.getElementById('cardArea');
const actions=document.getElementById('actions');
const heartBurst=document.getElementById('heartBurst');

let currentIdx=0;
let deck=[];
let mehed=JSON.parse(localStorage.getItem('mm2_mehed')||'[]');
let favs=JSON.parse(localStorage.getItem('mm2_favs')||'[]');
let soundOn=JSON.parse(localStorage.getItem('mm2_sound')||'true');
let hintShown=false;
let currentScene='';
let touchStartX=0;
let touchStartY=0;

const lightScenes=['temple','torii'];

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildDeck(){
  deck=shuffle(cards.filter((_,i)=>!mehed.includes(i)));
  currentIdx=0;
}
function createParticles(type){
  particles.innerHTML='';
  const count=20;
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    const left=Math.random()*100;
    const delay=Math.random()*5;
    const dur=4+Math.random()*6;
    const size=Math.random();
    switch(type){
      case'petals':
        p.classList.add('p-petal');
        p.style.cssText=`left:${left}%;top:${-10-Math.random()*20}px;width:${8+size*10}px;height:${10+size*12}px;opacity:${0.5+Math.random()*0.4};animation-duration:${dur}s;animation-delay:${delay}s`;
        break;
      case'fireflies':
        p.classList.add('p-firefly');
        p.style.cssText=`left:${left}%;top:${20+Math.random()*60}%;width:${4+size*3}px;height:${4+size*3}px;animation-duration:${6+Math.random()*8}s;animation-delay:${delay}s`;
        break;
      case'sparkles':
        p.classList.add('p-sparkle');
        p.style.cssText=`left:${left}%;top:${10+Math.random()*70}%;width:${2+size*3}px;height:${2+size*3}px;animation-duration:${1.5+Math.random()*2}s;animation-delay:${delay}s`;
        break;
      case'rain':
        p.classList.add('p-rain');
        p.style.cssText=`left:${left}%;top:${-30}px;width:1px;height:${15+size*15}px;animation-duration:${0.6+Math.random()*0.8}s;animation-delay:${delay*0.3}s`;
        break;
      case'lanterns':
        p.classList.add('p-lantern');
        p.style.cssText=`left:${left}%;bottom:-20px;width:${10+size*5}px;height:${12+size*6}px;animation-duration:${10+Math.random()*8}s;animation-delay:${delay}s`;
        break;
      case'butterflies':
        p.classList.add('p-butterfly');
        p.style.cssText=`left:${left}%;top:${20+Math.random()*60}%;width:${8+size*5}px;height:${8+size*5}px;animation-duration:${8+Math.random()*6}s;animation-delay:${delay}s`;
        break;
      case'snow':
        p.classList.add('p-snow');
        p.style.cssText=`left:${left}%;top:${-10}px;width:${3+size*4}px;height:${3+size*4}px;animation-duration:${dur+2}s;animation-delay:${delay}s`;
        break;
      case'lotus':
        p.classList.add('p-lotus');
        const bott=Math.random()*15;
        p.style.cssText=`left:${left}%;bottom:${bott}%;width:${20+size*12}px;height:${14+size*8}px;animation-duration:${3+Math.random()*3}s;animation-delay:${delay}s`;
        break;
    }
    particles.appendChild(p);
  }
}
function showCard(){
  if(currentIdx>=deck.length){buildDeck();}
  if(deck.length===0){qText.textContent='No more cards! Remove some from meh list.';return;}
  const card=deck[currentIdx];
  const sceneClass='scene-'+card.scene;
  if(currentScene!==sceneClass){
    scene.className='scene '+sceneClass;
    currentScene=sceneClass;
    createParticles(card.particles);
  }
  if(lightScenes.includes(card.scene)){
    qText.classList.add('light-scene');
  }else{
    qText.classList.remove('light-scene');
  }
  quoteWrap.style.animation='none';
  void quoteWrap.offsetHeight;
  quoteWrap.style.animation='fadeInUp .6s ease';
  qText.textContent=card.text;
  // Update fav button state
  const origIdx=cards.indexOf(card);
  if(favs.includes(origIdx)){
    favBtn.innerHTML='&#x2764;';
    favBtn.classList.add('loved');
  }else{
    favBtn.innerHTML='&#x2661;';
    favBtn.classList.remove('loved');
  }
}

function nextCard(){
  if(!hintShown){hint.classList.add('hidden');hintShown=true;}
  currentIdx++;
  showCard();
}

function mehCard(){
  if(deck.length===0)return;
  const card=deck[currentIdx];
  const origIdx=cards.indexOf(card);
  if(!mehed.includes(origIdx)){
    mehed.push(origIdx);
    localStorage.setItem('mm2_mehed',JSON.stringify(mehed));
  }
  // Animate out
  quoteWrap.style.animation='mehSlide .4s ease forwards';
  setTimeout(()=>{
    deck.splice(currentIdx,1);
    if(currentIdx>=deck.length)currentIdx=0;
    showCard();
  },400);
}
function favCard(){
  if(deck.length===0)return;
  const card=deck[currentIdx];
  const origIdx=cards.indexOf(card);
  if(favs.includes(origIdx)){
    favs=favs.filter(x=>x!==origIdx);
    favBtn.innerHTML='&#x2661;';
    favBtn.classList.remove('loved');
  }else{
    favs.push(origIdx);
    favBtn.innerHTML='&#x2764;';
    favBtn.classList.add('loved');
    burstHearts();
  }
  localStorage.setItem('mm2_favs',JSON.stringify(favs));
}

function burstHearts(){
  const rect=favBtn.getBoundingClientRect();
  heartBurst.style.left=rect.left+rect.width/2+'px';
  heartBurst.style.top=rect.top+'px';
  heartBurst.innerHTML='';
  for(let i=0;i<5;i++){
    const h=document.createElement('span');
    h.className='mini-heart';
    h.textContent='❤️';
    h.style.left=(Math.random()*40-20)+'px';
    h.style.animationDelay=(i*0.08)+'s';
    heartBurst.appendChild(h);
  }
  setTimeout(()=>{heartBurst.innerHTML='';},900);
}

function showFavorites(){
  favView.classList.remove('hidden');
  cardArea.style.display='none';
  actions.style.display='none';
  navHome.classList.remove('active');
  navFav.classList.add('active');
  renderFavList();
}

function showHome(){
  favView.classList.add('hidden');
  cardArea.style.display='flex';
  actions.style.display='flex';
  navHome.classList.add('active');
  navFav.classList.remove('active');
}
function renderFavList(){
  favList.innerHTML='';
  if(favs.length===0){
    favList.innerHTML='<p style="text-align:center;color:rgba(255,255,255,0.4);padding:40px;font-style:italic">No favorites yet. Tap the heart on cards you love.</p>';
    return;
  }
  favs.forEach((idx,fi)=>{
    const card=cards[idx];
    if(!card)return;
    const div=document.createElement('div');
    div.className='fav-card';
    div.innerHTML=`<span class="fav-card-text">${card.text}</span><button class="fav-card-rm" data-fi="${fi}">✕</button>`;
    favList.appendChild(div);
  });
  favList.querySelectorAll('.fav-card-rm').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const fi=parseInt(e.target.dataset.fi);
      favs.splice(fi,1);
      localStorage.setItem('mm2_favs',JSON.stringify(favs));
      renderFavList();
      // Update current card fav state
      if(deck.length>0){
        const card=deck[currentIdx];
        const origIdx=cards.indexOf(card);
        if(!favs.includes(origIdx)){
          favBtn.innerHTML='&#x2661;';
          favBtn.classList.remove('loved');
        }
      }
    });
  });
}

// Sound toggle
let audioCtx=null;
function playChime(){
  if(!soundOn)return;
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.type='sine';osc.frequency.setValueAtTime(800+Math.random()*400,audioCtx.currentTime);
    gain.gain.setValueAtTime(0.08,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);
    osc.start();osc.stop(audioCtx.currentTime+0.6);
  }catch(e){}
}

sndBtn.addEventListener('click',()=>{
  soundOn=!soundOn;
  localStorage.setItem('mm2_sound',JSON.stringify(soundOn));
  sndBtn.style.opacity=soundOn?'1':'0.4';
});
sndBtn.style.opacity=soundOn?'1':'0.4';
// Event listeners
mehBtn.addEventListener('click',e=>{e.stopPropagation();mehCard();});
favBtn.addEventListener('click',e=>{e.stopPropagation();favCard();playChime();});
navHome.addEventListener('click',showHome);
navFav.addEventListener('click',showFavorites);

// Tap to advance
cardArea.addEventListener('click',e=>{
  if(e.target.closest('.act-btn')||e.target.closest('.bottom-nav'))return;
  nextCard();
  playChime();
});

// Swipe to advance
cardArea.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
cardArea.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){
    nextCard();playChime();
  }
},{passive:true});

// Init
buildDeck();
showCard();

// Register SW
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
})();
</script>
</body>
</html>
