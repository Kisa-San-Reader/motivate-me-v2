<style>
*{margin:0;padding:0;box-sizing:border-box}
button:focus,button:focus-visible{outline:none;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:Georgia,serif}
body{background:#000;color:#fff;touch-action:pan-y;user-select:none;-webkit-user-select:none}

.phone-frame{position:relative;width:100%;height:100%;max-width:100%;margin:0 auto;overflow:hidden;background:#0a0a1a}

  body{display:flex;align-items:center;justify-content:center}
  .phone-frame{width:390px;height:844px;max-height:100vh;border-radius:40px;border:3px solid #222;box-shadow:0 0 60px rgba(0,0,0,0.8)}
}
.scene{position:absolute;inset:0;z-index:1;transition:opacity .8s ease}
.scene-bg{position:absolute;inset:0}
.scene::before,.scene::after{content:'';position:absolute;pointer-events:none}
.particles{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.card-area{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:40px 24px 140px}
.quote-wrap{text-align:center;max-width:340px;animation:fadeInUp 1s ease}
.quote-text{font-style:italic;font-size:20px;line-height:1.6;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.6),0 0 30px rgba(0,0,0,0.3)}
.quote-text.light-scene{color:#2a1a1a;text-shadow:0 1px 8px rgba(255,255,255,0.5)}
.hint{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);font-size:13px;color:rgba(255,255,255,0.5);z-index:11;transition:opacity 1s;font-style:italic}
.hint.hidden{opacity:0;pointer-events:none}
.actions{position:absolute;bottom:70px;left:0;right:0;z-index:20;display:flex;gap:28px;align-items:center;justify-content:center}
.act-btn{width:48px;height:48px;border-radius:50%;border:none;background:none;font-size:26px;cursor:pointer;transition:transform .2s;display:flex;align-items:center;justify-content:center;color:#fff;outline:none;-webkit-tap-highlight-color:transparent}
.act-btn:active{transform:scale(0.85)}
.fav-btn{font-size:28px;color:rgba(255,255,255,0.85)}
.fav-btn.loved{color:#ff4466;animation:heartPop .4s ease}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;z-index:30;display:flex;height:56px;background:rgba(10,10,20,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.08)}

.nav-btn.active{color:#fff}
.fav-view{position:absolute;inset:0;z-index:25;overflow:hidden}
.fav-view.hidden{display:none}
.fav-carousel{position:absolute;inset:0;z-index:0;overflow:hidden}

.fav-header{text-align:center;margin:0;padding:20px 0 12px;font-size:22px;font-weight:normal;position:relative;z-index:2;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,0.5);font-family:Georgia,serif}

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}

}

// Preload next image for instant transitions
function preloadNextImage(){
  const nextIdx=(currentIdx+1)%deck.length;
  if(nextIdx<deck.length&&deck[nextIdx]&&deck[nextIdx].bg){
    const img=new Image();
    img.src=deck[nextIdx].bg;
  }
}
function showCard(){
  if(currentIdx>=deck.length){buildDeck();}
  if(deck.length===0){qText.textContent='No more cards! Remove some from meh list.';return;}
  const card=deck[currentIdx];
  const sceneBg=scene.querySelector('.scene-bg');
  if(card.bg){
    // Image-based background with blur bleed
    const bgKey='bg:'+card.bg;
    if(currentScene!==bgKey){
      scene.className='scene scene-imgbg';
      // Blur bleed layer behind the image
      let blurEl=scene.querySelector('.scene-blur');
      if(!blurEl){blurEl=document.createElement('div');blurEl.className='scene-blur';scene.insertBefore(blurEl,sceneBg);}
      blurEl.style.backgroundImage='url('+card.bg+')';
      sceneBg.style.backgroundImage='url('+card.bg+')';
      currentScene=bgKey;
      createParticles(card.particles||'sparkles');
    }
  }else{
    // CSS scene-based background
    const sceneClass='scene-'+card.scene;
    if(currentScene!==sceneClass){
      scene.className='scene '+sceneClass;
      let blurEl=scene.querySelector('.scene-blur');
      if(blurEl){blurEl.remove();}
      sceneBg.style.backgroundImage='';
      sceneBg.style.backgroundSize='';
      sceneBg.style.backgroundPosition='';
      currentScene=sceneClass;
      createParticles(card.particles);
    }
  }
  if(card.bg){
    qText.classList.remove('light-scene');
  }else if(lightScenes.includes(card.scene)){
    qText.classList.add('light-scene');
  }else{
    qText.classList.remove('light-scene');
  }
  quoteWrap.style.animation='none';
  void quoteWrap.offsetHeight;
  quoteWrap.style.animation='fadeInUp 1s ease';
  qText.textContent=card.text;
  // Update fav button state
  const origIdx=cards.indexOf(card);
  if(favs.includes(origIdx)){
    favBtn.classList.add('loved');
  }else{
    favBtn.classList.remove('loved');
  }
  // Restart ambient with new sound for each card
  if(soundOn&&audioCtx){startAmbient();}
  // Preload next image
  preloadNextImage();
}
function nextCard(){
  if(!hintShown){hint.classList.add('hidden');hintShown=true;}
  currentIdx++;
  if(playingFavs&&currentIdx>=deck.length){currentIdx=0;}
  showCard();
}

function mehCard(){
  if(deck.length===0)return;
  const card=deck[currentIdx];
  const origIdx=cards.indexOf(card);
  if(!mehed.includes(origIdx)){
    mehed.push(origIdx);
    localStorage.setItem('mm2_mehed',JSON.stringify(mehed));
  }
  // Animate out
  quoteWrap.style.animation='mehSlide .4s ease forwards';
  setTimeout(()=>{
    deck.splice(currentIdx,1);
    if(currentIdx>=deck.length)currentIdx=0;
    showCard();
  },400);
}
function favCard(){
  if(deck.length===0)return;
  const card=deck[currentIdx];
  const origIdx=cards.indexOf(card);
  if(favs.includes(origIdx)){
    favs=favs.filter(x=>x!==origIdx);
    favBtn.classList.remove('loved');
  }else{
    favs.push(origIdx);
    favBtn.classList.add('loved');
    burstHearts();
  }
  localStorage.setItem('mm2_favs',JSON.stringify(favs));
}

function burstHearts(){
  const rect=favBtn.getBoundingClientRect();
  const frameRect=phoneFrame.getBoundingClientRect();
  heartBurst.style.left=(rect.left-frameRect.left+rect.width/2)+'px';
  heartBurst.style.top=(rect.top-frameRect.top)+'px';
  heartBurst.innerHTML='';
  const heartEmojis=['❤️','💕','💗','💖','✨'];
  for(let i=0;i<12;i++){
    const h=document.createElement('span');
    h.className='mini-heart';
    h.textContent=heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    const angle=Math.random()*Math.PI*2;
    const dist=40+Math.random()*60;
    const hx=Math.cos(angle)*dist;
    const hy=Math.sin(angle)*dist-30;
    h.style.cssText=`left:0;top:0;--hx:${hx}px;--hy:${hy}px;animation-delay:${Math.random()*0.6}s;font-size:${12+Math.random()*8}px`;
    heartBurst.appendChild(h);
  }
  setTimeout(()=>{heartBurst.innerHTML='';},2200);
}

// Favorites carousel — whimsy backgrounds with slow crossfade
const favCarousel=document.getElementById('favCarousel');
const whimsyBgs=[];
(function(){
  // Original whimsy: 132-184, New whimsy: 330-400
  for(let i=132;i<=184;i++)whimsyBgs.push('backgrounds/bg-'+String(i).padStart(3,'0')+'.png');
  for(let i=330;i<=400;i++)whimsyBgs.push('backgrounds/bg-'+String(i).padStart(3,'0')+'.png');
})();
let carouselImgs=[];
let carouselIdx=0;
let carouselTimer=null;
let carouselPreloaded=false;

function preloadCarousel(){
  if(carouselPreloaded)return;
  carouselPreloaded=true;
  // Shuffle and pick 12 images for the carousel
  const shuffled=[...whimsyBgs].sort(()=>Math.random()-0.5).slice(0,12);
  favCarousel.innerHTML='';
  carouselImgs=[];
  shuffled.forEach((src,i)=>{
    const img=new Image();
    img.src=src;
    img.alt='';
    img.draggable=false;
    if(i===0)img.classList.add('active');
    favCarousel.appendChild(img);
    carouselImgs.push(img);
  });
  carouselIdx=0;
}

function startCarousel(){
  preloadCarousel();
  if(carouselTimer)return;
  carouselTimer=setInterval(()=>{
    if(carouselImgs.length<2)return;
    carouselImgs[carouselIdx].classList.remove('active');
    carouselIdx=(carouselIdx+1)%carouselImgs.length;
    carouselImgs[carouselIdx].classList.add('active');
  },5000);
}

function stopCarousel(){
  if(carouselTimer){clearInterval(carouselTimer);carouselTimer=null;}
}

function showFavorites(){
  favView.classList.remove('hidden');
  cardArea.style.display='none';
  actions.style.display='none';
  navHome.classList.remove('active');
  navFav.classList.add('active');
  startCarousel();
  renderFavList();
}

function showHome(){
  stopCarousel();
  favView.classList.add('hidden');
  cardArea.style.display='flex';
  actions.style.display='flex';
  navHome.classList.add('active');
  navFav.classList.remove('active');
  if(playingFavs){
    playingFavs=false;
    buildDeck();
    showCard();
  }
}
function renderFavList(){
  favList.innerHTML='';
  if(favs.length===0){
    favList.innerHTML='<p style="text-align:center;color:rgba(255,255,255,0.4);padding:40px;font-style:italic">No favorites yet. Tap the heart on cards you love.</p>';
    return;
  }
  favs.forEach((idx,fi)=>{
    const card=cards[idx];
    if(!card)return;
    const div=document.createElement('div');
    div.className='fav-card';
    div.innerHTML=`<span class="fav-card-text">${card.text}</span><button class="fav-card-rm" data-fi="${fi}">✕</button>`;
    favList.appendChild(div);
  });
  favList.querySelectorAll('.fav-card-rm').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const fi=parseInt(e.target.dataset.fi);
      favs.splice(fi,1);
      localStorage.setItem('mm2_favs',JSON.stringify(favs));
      renderFavList();
      // Update current card fav state
      if(deck.length>0){
        const card=deck[currentIdx];
        const origIdx=cards.indexOf(card);
        if(!favs.includes(origIdx)){
          favBtn.classList.remove('loved');
        }
      }
    });
  });
}

// Play Favorites
function playFavorites(){
  if(favs.length===0)return;
  stopCarousel();
  favView.classList.add('hidden');
  cardArea.style.display='flex';
  actions.style.display='flex';
  navHome.classList.add('active');
  navFav.classList.remove('active');
  playingFavs=true;
  deck=favs.map(idx=>cards[idx]).filter(Boolean);
  currentIdx=0;
  showCard();
}
document.getElementById('playFavBtn').addEventListener('click',playFavorites);

// Whimsical music system — toggle on/off, loops per card
let audioCtx=null;
let soundOn=JSON.parse(localStorage.getItem('mm2_sound')||'false');
let ambientNodes=[];
let ambientInterval=null;
let currentMusicIdx=0;

// Musical scales and patterns for whimsical loops
const musicalModes={
  musicBox:function(ctx,dur){
    // Music box arpeggio — pentatonic, gentle and dreamy
    const master=ctx.createGain();master.gain.value=0.12;master.connect(ctx.destination);
    const reverb=ctx.createConvolver();
    const revBuf=ctx.createBuffer(1,ctx.sampleRate*2,ctx.sampleRate);
    const revData=revBuf.getChannelData(0);
    for(let i=0;i<revData.length;i++){revData[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.8));}
    reverb.buffer=revBuf;reverb.connect(master);
    const notes=[523.25,587.33,659.25,783.99,880,1046.5,1174.66,1318.51];
    let t=0;const step=0.4+Math.random()*0.2;
    while(t<dur-1){
      const note=notes[Math.floor(Math.random()*notes.length)];
      const osc=ctx.createOscillator();const g=ctx.createGain();
      osc.type='sine';osc.frequency.value=note;
      osc.connect(g);g.connect(reverb);
      const startT=ctx.currentTime+t;
      g.gain.setValueAtTime(0,startT);
      g.gain.linearRampToValueAtTime(0.6,startT+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,startT+1.2);
      osc.start(startT);osc.stop(startT+1.3);
      t+=step;
    }
    return{src:null,gain:master};
  },
  celesta:function(ctx,dur){
    // Celesta-like shimmer — soft melodic pattern
    const master=ctx.createGain();master.gain.value=0.1;master.connect(ctx.destination);
    const scale=[392,440,493.88,523.25,587.33,659.25,698.46,783.99];
    const pattern=[0,2,4,5,7,5,4,2];
    let t=0;let pi=0;const step=0.55;
    while(t<dur-1){
      const freq=scale[pattern[pi%pattern.length]];
      const osc=ctx.createOscillator();const g=ctx.createGain();
      osc.type='triangle';osc.frequency.value=freq;
      // Add slight harmonic
      const osc2=ctx.createOscillator();const g2=ctx.createGain();
      osc2.type='sine';osc2.frequency.value=freq*2;
      g2.gain.value=0.3;
      osc.connect(g);osc2.connect(g2);g.connect(master);g2.connect(master);
      const startT=ctx.currentTime+t;
      g.gain.setValueAtTime(0,startT);
      g.gain.linearRampToValueAtTime(0.5,startT+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,startT+1.0);
      g2.gain.setValueAtTime(0,startT);
      g2.gain.linearRampToValueAtTime(0.15,startT+0.02);
      g2.gain.exponentialRampToValueAtTime(0.001,startT+0.8);
      osc.start(startT);osc.stop(startT+1.1);
      osc2.start(startT);osc2.stop(startT+0.9);
      t+=step;pi++;
    }
    return{src:null,gain:master};
  },
  dreamPad:function(ctx,dur){
    // Soft evolving pad — warm and meditative
    const master=ctx.createGain();master.gain.value=0.08;master.connect(ctx.destination);
    const chordNotes=[[261.63,329.63,392],[293.66,349.23,440],[261.63,311.13,392],[246.94,311.13,369.99]];
    const chord=chordNotes[Math.floor(Math.random()*chordNotes.length)];
    chord.forEach(freq=>{
      const osc=ctx.createOscillator();const g=ctx.createGain();
      osc.type='sine';osc.frequency.value=freq;
      const lfo=ctx.createOscillator();const lfoG=ctx.createGain();
      lfo.type='sine';lfo.frequency.value=0.2+Math.random()*0.3;lfoG.gain.value=2;
      lfo.connect(lfoG);lfoG.connect(osc.frequency);lfo.start(ctx.currentTime);
      osc.connect(g);g.connect(master);
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.4,ctx.currentTime+2);
      g.gain.setValueAtTime(0.4,ctx.currentTime+dur-2);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
      lfo.stop(ctx.currentTime+dur);
    });
    return{src:null,gain:master};
  },
  windChimes:function(ctx,dur){
    // Wind chimes — random pentatonic bells
    const master=ctx.createGain();master.gain.value=0.1;master.connect(ctx.destination);
    const notes=[523.25,659.25,783.99,987.77,1174.66,1318.51,1567.98];
    let t=0;
    while(t<dur-1){
      const freq=notes[Math.floor(Math.random()*notes.length)];
      const osc=ctx.createOscillator();const g=ctx.createGain();
      osc.type='sine';osc.frequency.value=freq;
      const osc2=ctx.createOscillator();const g2=ctx.createGain();
      osc2.type='sine';osc2.frequency.value=freq*2.01;g2.gain.value=0.2;
      osc.connect(g);osc2.connect(g2);g.connect(master);g2.connect(master);
      const startT=ctx.currentTime+t;
      g.gain.setValueAtTime(0,startT);
      g.gain.linearRampToValueAtTime(0.4,startT+0.005);
      g.gain.exponentialRampToValueAtTime(0.001,startT+2.0);
      g2.gain.setValueAtTime(0,startT);
      g2.gain.linearRampToValueAtTime(0.08,startT+0.005);
      g2.gain.exponentialRampToValueAtTime(0.001,startT+1.5);
      osc.start(startT);osc.stop(startT+2.1);
      osc2.start(startT);osc2.stop(startT+1.6);
      t+=0.6+Math.random()*1.2;
    }
    return{src:null,gain:master};
  },
  lullaby:function(ctx,dur){
    // Gentle lullaby melody — simple and warm
    const master=ctx.createGain();master.gain.value=0.1;master.connect(ctx.destination);
    const melody=[392,440,523.25,440,392,349.23,330,349.23,392,440,523.25,587.33,523.25,440,392,349.23];
    let t=0;let mi=0;const step=0.65;
    while(t<dur-1){
      const freq=melody[mi%melody.length];
      const osc=ctx.createOscillator();const g=ctx.createGain();
      osc.type='triangle';osc.frequency.value=freq;
      osc.connect(g);g.connect(master);
      const startT=ctx.currentTime+t;
      g.gain.setValueAtTime(0,startT);
      g.gain.linearRampToValueAtTime(0.45,startT+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,startT+0.9);
      osc.start(startT);osc.stop(startT+1.0);
      t+=step;mi++;
    }
    return{src:null,gain:master};
  },
  sparkleArp:function(ctx,dur){
    // Fast sparkle arpeggio — fairy dust feeling
    const master=ctx.createGain();master.gain.value=0.07;master.connect(ctx.destination);
    const notes=[1046.5,1174.66,1318.51,1567.98,1760,2093];
    let t=0;let dir=1;let ni=0;
    while(t<dur-0.5){
      const freq=notes[ni];
      const osc=ctx.createOscillator();const g=ctx.createGain();
      osc.type='sine';osc.frequency.value=freq;
      osc.connect(g);g.connect(master);
      const startT=ctx.currentTime+t;
      g.gain.setValueAtTime(0,startT);
      g.gain.linearRampToValueAtTime(0.5,startT+0.005);
      g.gain.exponentialRampToValueAtTime(0.001,startT+0.6);
      osc.start(startT);osc.stop(startT+0.7);
      ni+=dir;
      if(ni>=notes.length-1){dir=-1;ni=notes.length-1;}
      if(ni<=0){dir=1;ni=0;}
      t+=0.2+Math.random()*0.15;
    }
    return{src:null,gain:master};
  }
};

const musicTypes=['musicBox','celesta','dreamPad','windChimes','lullaby','sparkleArp'];

function stopAmbient(){
  if(ambientInterval){clearInterval(ambientInterval);ambientInterval=null;}
  ambientNodes.forEach(n=>{try{if(n.gain){n.gain.gain.cancelScheduledValues(audioCtx.currentTime);n.gain.gain.setValueAtTime(0,audioCtx.currentTime);}}catch(e){}});
  ambientNodes=[];
}

function startAmbient(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  stopAmbient();
  const type=musicTypes[currentMusicIdx%musicTypes.length];
  currentMusicIdx++;
  function playLoop(){
    const node=musicalModes[type](audioCtx,12);
    ambientNodes.push(node);
  }
  playLoop();
  ambientInterval=setInterval(playLoop,12000);
}

function toggleSound(){
  soundOn=!soundOn;
  localStorage.setItem('mm2_sound',JSON.stringify(soundOn));
  sndBtn.style.opacity=soundOn?'1':'0.4';
  if(soundOn){
    startAmbient();
  }else{
    stopAmbient();
  }
}

function playChime(){
  if(!soundOn)return;
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    const notes=[1046.5,1318.51,1567.98];
    const now=audioCtx.currentTime;
    notes.forEach((freq,i)=>{
      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();
      osc.connect(gain);gain.connect(audioCtx.destination);
      osc.type='sine';osc.frequency.value=freq;
      gain.gain.setValueAtTime(0,now+i*0.08);
      gain.gain.linearRampToValueAtTime(0.05,now+i*0.08+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001,now+i*0.08+0.4);
      osc.start(now+i*0.08);osc.stop(now+i*0.08+0.5);
    });
  }catch(e){}
}

sndBtn.addEventListener('click',e=>{e.stopPropagation();toggleSound();});
sndBtn.style.opacity=soundOn?'1':'0.4';

// Mismatch reporting system
let mismatchLog=JSON.parse(localStorage.getItem('mm2_mismatch_log')||'[]');
let mismatchTooltipCount=parseInt(localStorage.getItem('mm2_mismatch_shown')||'0');

function reportMismatch(){
  if(deck.length===0)return;
  const card=deck[currentIdx];
  const origIdx=cards.indexOf(card);
  if(mismatched.includes(origIdx))return; // already reported
  
  mismatched.push(origIdx);
  localStorage.setItem('mm2_mismatched',JSON.stringify(mismatched));
  
  // Log with details for review
  mismatchLog.push({idx:origIdx,text:card.text,bg:card.bg,date:new Date().toISOString()});
  localStorage.setItem('mm2_mismatch_log',JSON.stringify(mismatchLog));
  
  // Lightning — thin diagonal zigzag, random direction, soft cream-gold, starts off-screen
  const tear=document.createElement('div');
  tear.className='lightning-tear';
  const overlay=document.createElement('div');
  overlay.className='lightning-overlay';
  tear.appendChild(overlay);
  const cvs=document.createElement('canvas');
  tear.appendChild(cvs);
  phoneFrame.appendChild(tear);
  const w=phoneFrame.offsetWidth;
  const h=phoneFrame.offsetHeight;
  cvs.width=w;cvs.height=h;
  cvs.style.opacity='0.7';
  const ctx2=cvs.getContext('2d');
  function zigzag(x1,y1,x2,y2,jitter){
    const pts=[{x:x1,y:y1}];
    const dist=Math.hypot(x2-x1,y2-y1);
    const segs=Math.max(8,Math.floor(dist/20));
    for(let i=1;i<segs;i++){
      const t=i/segs;
      const mx=x1+(x2-x1)*t+(Math.random()-0.5)*jitter;
      const my=y1+(y2-y1)*t+(Math.random()-0.5)*jitter*0.5;
      pts.push({x:mx,y:my});
    }
    pts.push({x:x2,y:y2});
    return pts;
  }
  // Color palette — soft cream/gold/off-white mix
  const boltColors=['rgba(255,245,220,','rgba(255,230,180,','rgba(255,220,150,','rgba(250,240,210,'];
  function strokeBolt(pts,width,alpha){
    const color=boltColors[Math.floor(Math.random()*boltColors.length)];
    ctx2.beginPath();
    ctx2.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++){ctx2.lineTo(pts[i].x,pts[i].y);}
    ctx2.strokeStyle=color+alpha+')';
    ctx2.lineWidth=width;
    ctx2.lineCap='round';ctx2.lineJoin='round';
    ctx2.shadowColor=color+'0.5)';
    ctx2.shadowBlur=width*3;
    ctx2.stroke();
    ctx2.shadowBlur=0;
  }
  // Random direction: top-left→bottom-right OR top-right→bottom-left
  const mirror=Math.random()>0.5;
  const sx=mirror?(w*0.65+Math.random()*w*0.3):(w*0.05+Math.random()*w*0.3);
  const sy=-30-Math.random()*40; // Start ABOVE screen
  const ex=mirror?(w*0.05+Math.random()*w*0.25):(w*0.6+Math.random()*w*0.3);
  const ey=h+20+Math.random()*30; // End BELOW screen
  const mainPts=zigzag(sx,sy,ex,ey,35);
  // Glow
  strokeBolt(mainPts,5,0.12);
  // Mid
  strokeBolt(mainPts,2,0.35);
  // Core
  strokeBolt(mainPts,0.8,0.8);
  // Veins
  for(let i=2;i<mainPts.length-2;i++){
    if(Math.random()<0.35){
      const angle=Math.atan2(ey-sy,ex-sx)+(Math.random()>0.5?1:-1)*(0.5+Math.random()*0.8);
      const len=20+Math.random()*45;
      const bx=mainPts[i].x+Math.cos(angle)*len;
      const by=mainPts[i].y+Math.sin(angle)*len;
      const veinPts=zigzag(mainPts[i].x,mainPts[i].y,bx,by,10);
      strokeBolt(veinPts,2.5,0.08);
      strokeBolt(veinPts,1,0.25);
      strokeBolt(veinPts,0.4,0.6);
      // Sub-veins
      if(Math.random()<0.3&&veinPts.length>3){
        const vi=Math.floor(veinPts.length*0.5);
        const a2=angle+(Math.random()-0.5)*1.2;
        const l2=12+Math.random()*20;
        const svPts=zigzag(veinPts[vi].x,veinPts[vi].y,veinPts[vi].x+Math.cos(a2)*l2,veinPts[vi].y+Math.sin(a2)*l2,6);
        strokeBolt(svPts,0.3,0.4);
      }
    }
  }
  // Fade
  cvs.style.transition='opacity 0.5s ease-out 0.3s';
  setTimeout(()=>{cvs.style.opacity='0';},50);
  setTimeout(()=>{tear.remove();},900);
  
  // Show tooltip for first 5 uses
  if(mismatchTooltipCount<5){
    mismatchTooltipCount++;
    localStorage.setItem('mm2_mismatch_shown',String(mismatchTooltipCount));
    showMismatchTooltip();
    setTimeout(()=>{
      deck.splice(currentIdx,1);
      if(currentIdx>=deck.length)currentIdx=0;
      showCard();
    },1200);
  }else{
    setTimeout(()=>{
      deck.splice(currentIdx,1);
      if(currentIdx>=deck.length)currentIdx=0;
      showCard();
    },500);
  }
}

function showMismatchTooltip(){
  let tip=document.querySelector('.mismatch-tooltip');
  if(!tip){
    tip=document.createElement('div');
    tip.className='mismatch-tooltip';
    tip.textContent='Tap here if the quote doesn\u2019t match the image';
    document.querySelector('.actions').appendChild(tip);
  }
  tip.classList.add('show');
  setTimeout(()=>{tip.classList.remove('show');},2500);
}

// Event listeners
mismatchBtn.addEventListener('click',e=>{e.stopPropagation();reportMismatch();});
mehBtn.addEventListener('click',e=>{e.stopPropagation();mehCard();});
favBtn.addEventListener('click',e=>{e.stopPropagation();favCard();playChime();});
navHome.addEventListener('click',showHome);
navFav.addEventListener('click',showFavorites);

// Tap to advance
cardArea.addEventListener('click',e=>{
  if(e.target.closest('.act-btn')||e.target.closest('.bottom-nav'))return;
  nextCard();
  playChime();
});

// Swipe to advance
cardArea.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
cardArea.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){
    nextCard();playChime();
  }
},{passive:true});

// Fairy dust trail on touch move
const dustColors=['rgba(255,215,0,0.7)','rgba(255,255,255,0.8)','rgba(200,200,255,0.6)','rgba(255,180,100,0.6)','rgba(220,220,255,0.7)'];
let dustThrottle=0;
function spawnDust(x,y){
  const now=Date.now();
  if(now-dustThrottle<40)return;
  dustThrottle=now;
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    d.className='fairy-dust';
    const sz=2+Math.random()*4;
    const ox=(Math.random()-0.5)*12;
    const oy=(Math.random()-0.5)*12;
    const color=dustColors[Math.floor(Math.random()*dustColors.length)];
    d.style.cssText=`left:${x+ox}px;top:${y+oy}px;width:${sz}px;height:${sz}px;background:${color};box-shadow:0 0 ${sz+2}px ${color}`;
    phoneFrame.appendChild(d);
    setTimeout(()=>{d.remove();},800);
  }
}
cardArea.addEventListener('touchmove',e=>{
  const touch=e.touches[0];
  const rect=phoneFrame.getBoundingClientRect();
  spawnDust(touch.clientX-rect.left,touch.clientY-rect.top);
},{passive:true});
// Mouse fallback for desktop
cardArea.addEventListener('mousemove',e=>{
  if(e.buttons===0)return;
  const rect=phoneFrame.getBoundingClientRect();
  spawnDust(e.clientX-rect.left,e.clientY-rect.top);
});

// Init
buildDeck();
showCard();

// Register SW
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
})();
